statement: "Au moins 17 espèces de lémuriens subfossiles, toutes éteintes, ont disparu de Madagascar ; toutes étaient bien plus grandes que les espèces vivantes (masse de l'ordre de 11 à 160 kg), la plus grande, Archaeoindris fontoynonti, approchant la taille d'un gorille mâle."
statut: reconstruit
discipline: autre
domain: megafaune
