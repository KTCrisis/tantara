statement: "Rasoherina (1863-1868) règne sous une monarchie devenue constitutionnelle de fait : le pouvoir glisse vers le Premier ministre, qu'elle épouse."
statut: attesté
discipline: histoire
domain: imerina-souverains
period: [1863, 1868]
sources: [gha-v]
note: "Première des trois reines successives mariées au même homme fort, Rainilaiarivony."
