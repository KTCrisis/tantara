statement: "Tout ce qu'on sait des règnes antérieurs à 1810 vient du Tantara ny Andriana, vaste compilation des traditions merina rassemblée par le père Callet entre 1878 et 1881."
statut: reconstruit
discipline: histoire
domain: imerina-souverains
sources: [callet-1878]
note: "Recueilli un à trois siècles après les faits, à la cour d'une dynastie qui écrit sa propre légitimité, ce corpus — qui donne son nom à ce site — est depuis commenté et contesté par les historiens. C'est une source majeure, pas un procès-verbal."
scope: [royaume-imerina, merina]
