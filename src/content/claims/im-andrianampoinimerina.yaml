statement: "Andrianampoinimerina (~1787-1810) réunifie l'Imerina et pose son ambition en formule restée célèbre : « la mer pour limite de ma rizière »."
statut: récit
discipline: histoire
domain: imerina-souverains
period: [1787, 1810]
sources: [callet-1878]
note: "Charnière entre tradition et archive : on le connaît surtout par le Tantara ny Andriana, compilé un demi-siècle après sa mort, d'où le statut récit, malgré une réunification historiquement admise."
scope: [royaume-imerina, merina]
