statement: "Les sampy, talismans-palladiums protecteurs du royaume merina (Kelimalaza, Ramahavaly…), furent brûlés en 1869 par la reine Ranavalona II lors de sa conversion publique au christianisme."
statut: attesté
discipline: histoire
domain: traditions
period: [1700, 1869]
sources: [randrianja-ellis-2009]
note: "L'autodafé des sampy marque le basculement de l'Imerina vers le christianisme d'État : une tradition abolie par décret, charnière vers le siècle colonial."
scope: [merina, royaume-imerina, ile-madagascar]
