statement: "La circoncision des garçons (famorana) est un rite de passage majeur, jadis rythmé à l'échelle du royaume ; il fait entrer l'enfant dans la lignée des ancêtres et dans l'ordre social."
statut: attesté
discipline: autre
domain: traditions
sources: [bloch-1986]
note: "Comme le kabary, ce n'est pas un marqueur d'origine : un rite de passage, que Bloch a relié au pouvoir royal merina et à son idéologie."
scope: [merina, ile-madagascar]
