statement: "Le lambamena, linceul de soie rouge tissé de la soie sauvage du landibe (Borocera), enveloppe les morts et les réenveloppe au famadihana : la richesse offerte aux ancêtres se mesure en soie."
statut: attesté
discipline: autre
domain: traditions
sources: [bloch-1971]
note: "Le tissage relie l'héritage austronésien (le métier, le lamba) à une matière endémique, la soie sauvage de l'île. Le linceul est l'objet central du retournement des morts."
scope: [merina, betsileo, ile-madagascar]
