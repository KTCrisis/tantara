statement: "Isolée des continents depuis ~88 Ma sans pont terrestre, Madagascar présente un endémisme exceptionnel : 90 % de ses 1 314 vertébrés terrestres et d'eau douce natifs, et 82 % de ses 11 516 plantes vasculaires natives, n'existent nulle part ailleurs."
