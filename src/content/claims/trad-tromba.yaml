statement: "Le tromba, possession par les esprits des rois sakalava défunts à travers un médium en transe, prolonge les cultes de possession de la rive occidentale de l'océan Indien : une part nettement africaine du religieux malgache."
statut: attesté
discipline: autre
domain: traditions
geo: { lat: -16.1, lng: 45.6, route: bantou, label: "Pays sakalava (Nord-Ouest)" }
sources: [sharp-1993]
note: "Le mot, d'origine sakalava, désigne aujourd'hui par extension la possession dans toute l'île. Il maintient un lien vivant avec les dynasties du Nord-Ouest, héritières du premier empire malgache, de fondation africaine."
scope: [sakalava, ile-madagascar]
