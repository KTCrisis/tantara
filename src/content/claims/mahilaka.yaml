statement: "Mahilaka, fondée vers le Xe siècle dans la baie d'Ampasindava, est la première ville connue de Madagascar — un port de commerce intégré aux réseaux swahili de l'océan Indien."
statut: mesuré
discipline: archéologie
domain: peuplement
period: [900, 1400]
geo: { lat: -13.7, lng: 48.2, route: arabo-swahili, label: "Mahilaka (baie d'Ampasindava)" }
sources: [radimilahy-1998]
note: "Fouilles : mosquée, enceinte, céramiques importées, cristal de roche, perles — la matérialité du lien arabo-swahili."
