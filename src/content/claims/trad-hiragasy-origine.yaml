statement: "La tradition attribue la naissance du hira gasy, spectacle des Hautes Terres mêlant discours, chant et danse, au règne d'Andrianampoinimerina (fin du XVIIIe siècle) : des troupes de chanteurs auraient encouragé les grands travaux de rizières et porté la parole royale dans les campagnes."
statut: récit
discipline: histoire
domain: traditions
period: [1787, 1810]
sources: [mauro-2001, mcm-hiragasy]
note: "Attribution constante dans la tradition orale mais sans archive d'époque ; les datations proposées vont du XVe au milieu du XIXe siècle selon les sources."
scope: [merina, royaume-imerina]
