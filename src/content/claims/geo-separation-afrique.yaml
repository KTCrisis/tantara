statement: "Madagascar s'est séparée de l'Afrique lors de l'éclatement du Gondwana : au Jurassique moyen (~165-160 Ma), le rifting puis l'expansion océanique dans le bassin somalien font dériver le bloc malgache vers le sud, jusqu'à sa position actuelle atteinte au Crétacé inférieur."
