statement: "Le vintana, système du destin qui partage le temps en jours et heures fastes ou néfastes, repose sur douze figures calquées sur les douze mois lunaires arabes ; les noms des jours eux-mêmes (Alahady, Alatsinainy…) sont des emprunts à l'arabe."
statut: attesté
discipline: linguistique
domain: traditions
geo: { lat: -22.8, lng: 47.8, route: arabo-swahili, label: "Savoir antemoro (Sud-Est)" }
sources: [beaujard-2020, faublee-1970]
note: "L'emprunt est lisible à même la langue : le calendrier du destin porte, dans ses mots, la marque de son origine arabo-musulmane. Cousin du sikidy."
scope: [antaimoro, ile-madagascar]
