statement: "Au XIXe siècle, les Bara des plateaux du Centre-Sud étaient organisés en quatre grands royaumes issus de la dynastie Zafimanely : Iantsantsa (Ivohibe), Be (Ihosy, Ranohira), Imamono (Ankazoabo) et Vinda (Benenitra)."
