statement: "L'ascendance varie géographiquement : majoritairement asiatique sur les Hautes Terres, majoritairement africaine sur les côtes — tous les Malgaches portant les deux."
statut: mesuré
discipline: génétique
domain: peuplement
sources: [pierron-2017]
note: "Gradient mesuré sur ~2 700 génomes couvrant 257 villages ; aucun groupe n'est « purement » l'un ou l'autre."
