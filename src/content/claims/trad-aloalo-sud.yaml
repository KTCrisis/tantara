statement: "Dans le Sud, chez les Mahafaly et les Antandroy, la tombe devient œuvre : stèles de bois sculptées (aloalo) dressées sur le tertre, surmontées de figures, et bucranes de zébus sacrifiés au funéraille."
statut: attesté
discipline: autre
domain: traditions
sources: [curnow-2021, escargueil-1936]
note: "Le zébu, héritage africain, est au cœur du rite : sa corne sur la tombe dit la richesse offerte aux morts. L'aloalo est aujourd'hui une icône de l'art malgache."
scope: [mahafaly, antandroy]
