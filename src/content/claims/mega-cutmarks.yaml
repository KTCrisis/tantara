statement: "Des os d'oiseaux-éléphants (Aepyornis et Mullerornis) portant des marques de découpe et des fractures périmortem, datés à plus de 10 500 ans, ont été présentés comme un indice d'activité humaine très ancienne ; cette datation, qui devancerait toute autre preuve de plusieurs millénaires, est contestée."
statut: conjectural
discipline: archéologie
domain: megafaune
period: [-8500, -8500]
