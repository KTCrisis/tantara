statement: "Le famadihana, seconde inhumation des Hautes Terres où l'on exhume et réenveloppe les ancêtres dans des linceuls neufs, relève d'une tradition de double funéraille qu'on retrouve dans le monde austronésien, de Sulawesi à Bali."
statut: reconstruit
discipline: histoire
domain: traditions
sources: [larson-2001]
note: "Le rapprochement est comparatif : il rattache la pratique à l'héritage austronésien sans en faire un calque immobile. La parenté est de famille, pas de copie."
scope: [merina, betsileo, austronesiens]
