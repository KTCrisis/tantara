statement: "Dans la tradition des Hautes Terres, les Vazimba sont les premiers occupants du pays, présents avant l'arrivée des ancêtres andriana qui les refoulent ou les absorbent."
statut: récit
discipline: histoire
domain: peuplement
sources: [callet-1878]
note: "Connus par la seule tradition orale, compilée au XIXe siècle ; cf. Andriamanelo, à qui l'on prête la lutte contre les Vazimba. Aucune strate archéologique « vazimba » n'est aujourd'hui isolée."
scope: [vazimba, merina, ile-madagascar]
