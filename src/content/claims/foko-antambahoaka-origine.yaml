statement: "La tradition d'origine des Antambahoaka du Sud-Est les rattache à des migrants musulmans installés à l'embouchure de la Matitanana à la fin du XVe siècle, et à des Zafiraminia islamisés arrivés sur la côte est vers le XIIIe siècle ; cette aristocratie conserve des manuscrits sacrés en graphie arabico-malgache (sorabe)."
