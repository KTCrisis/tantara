statement: "Le fady, interdit hérité des ancêtres, régit lieux, aliments, jours et gestes ; le transgresser, c'est rompre avec les razana, et la sanction est d'abord sociale avant d'être surnaturelle."
statut: attesté
discipline: autre
domain: traditions
sources: [ruud-1960]
note: "Le fady varie d'un lignage et d'une région à l'autre : il n'y a pas un code unique mais une grammaire d'interdits, négociée et vivante."
scope: [ile-madagascar]
