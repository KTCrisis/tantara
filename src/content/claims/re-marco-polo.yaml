statement: "Le nom Madagascar apparaît pour la première fois dans le récit de Marco Polo (vers 1298), sous la forme Madeigascar, sans que Polo ait jamais vu l'île ; l'édition critique de Yule et Cordier y signale une probable confusion avec Mogadiscio (Magadoxo)."
statut: récit
discipline: histoire
domain: regards-exterieurs
period: [1298, 1298]
sources: [yule-cordier-1903]
scope: [ile-madagascar]
note: "Le nom même de l'île vient donc d'un texte étranger, et probablement d'une méprise."
