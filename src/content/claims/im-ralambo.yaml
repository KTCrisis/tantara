statement: "Ralambo (~1575-1612) aurait donné son nom à l'« Imerina », levé la première armée permanente et institué le culte des sampy (talismans royaux)."
statut: récit
discipline: histoire
domain: imerina-souverains
period: [1575, 1612]
sources: [callet-1878]
note: "On lui attribue aussi l'introduction de la consommation du zébu — couche d'actes fondateurs typique des récits dynastiques."
