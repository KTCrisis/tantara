statement: "Les ethnonymes actuels (Merina, Betsileo, Sakalava, Tandroy...) se cristallisent avec les royaumes des XVIe-XIXe siècles, les projeter sur les siècles antérieurs est un anachronisme."
statut: reconstruit
discipline: histoire
domain: geographie-historique
period: [1540, 1900]
sources: [gha-v]
note: "Ce sont des identités politiques devenues « ethnies » sous la colonisation. Les cartes (y compris celles des jeux de stratégie) qui peuplent l'île de 1337 avec ces noms écrivent l'histoire à rebours."
scope: [ile-madagascar]
