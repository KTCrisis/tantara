statement: "La valiha, cithare tubulaire en bambou tenue pour l'instrument national, descend des cithares sur tube de l'Asie du Sud-Est insulaire (telle la sasandu de Roti) : un héritage austronésien aussi parlant que la langue."
statut: reconstruit
discipline: autre
domain: traditions
sources: [britannica-valiha]
note: "Filiation établie par comparaison organologique ; la datation de son arrivée est discutée. La forme ancienne était idiochorde, ses cordes taillées dans l'écorce même du bambou."
scope: [merina, austronesiens, ile-madagascar]
