statement: "Jean Laborde, naufragé arrivé en 1831, gagne la faveur de la reine Ranavalona Ire et bâtit à Mantasoa (1837) un complexe industriel (fonderie, armes, textile, verre) employant des milliers de Malgaches."
statut: récit
discipline: histoire
domain: regards-exterieurs
period: [1831, 1878]
geo: { lat: -19.16, lng: 47.83, label: "Mantasoa (Imerina)" }
sources: [gha-v]
note: "Un regard d'un autre genre : non plus décrire l'île, mais la transformer. Exilé en 1857 à la mort de la reine, il revient consul de France en 1862, la frontière entre aventurier, industriel et agent d'influence est mince."
scope: [ile-madagascar]
