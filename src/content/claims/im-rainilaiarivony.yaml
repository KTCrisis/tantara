statement: "Le Premier ministre Rainilaiarivony exerce le pouvoir réel de 1864 à 1895 : il épouse successivement les trois dernières reines et dirige l'État jusqu'à la conquête française."
statut: attesté
discipline: histoire
domain: imerina-souverains
period: [1864, 1895]
sources: [gha-v]
note: "La monarchie de la fin est d'abord un gouvernement de Premier ministre, la couronne règne, lui gouverne."
scope: [royaume-imerina, merina]
