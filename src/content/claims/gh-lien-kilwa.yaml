statement: "Un statut tributaire des ports malgaches envers le sultanat de Kilwa n'est pas démontré, les liens commerciaux sont attestés, la subordination politique ne l'est pas."
statut: conjectural
discipline: histoire
domain: geographie-historique
period: [1100, 1500]
sources: [gha-iv, radimilahy-1998]
note: "L'idée vient surtout de la Chronique de Kilwa, source intéressée qui prêche pour son sultanat... Les importations swahili dans les ports malgaches prouvent l'échange, pas la vassalité."
scope: [ile-madagascar]
