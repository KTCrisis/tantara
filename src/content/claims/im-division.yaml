statement: "De ~1710 à 1787, l'Imerina reste morcelé en quatre royaumes rivaux, avant sa réunification par Andrianampoinimerina."
statut: récit
discipline: histoire
domain: imerina-souverains
period: [1710, 1787]
sources: [callet-1878]
note: "Période connue surtout en creux, par la geste réunificatrice qui lui succède et qui avait tout intérêt à en noircir le souvenir."
scope: [royaume-imerina, merina]
