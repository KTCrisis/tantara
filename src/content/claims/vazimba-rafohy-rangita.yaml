statement: "La généalogie royale merina place à son origine deux souveraines, Rafohy et Rangita, rattachées au temps des Vazimba, que leurs successeurs Andriamanelo puis Ralambo supplantent."
statut: récit
discipline: histoire
domain: peuplement
period: [1500, 1575]
sources: [callet-1878]
note: "La dynastie merina inscrit ainsi ses propres origines dans le monde vazimba qu'elle dit ensuite avoir dompté : un récit de fondation autant qu'un souvenir."
scope: [vazimba, merina, royaume-imerina]
