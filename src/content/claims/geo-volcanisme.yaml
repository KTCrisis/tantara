statement: "Le volcanisme malgache se décline en deux temps : les épanchements crétacés (~88 Ma) liés au panache de Marion lors de la rupture avec l'Inde, puis un volcanisme intraplaque récent (Ankaratra et Itasy sur les hautes terres, Nosy Be et Massif d'Ambre au nord), actif jusqu'au Pléistocène (~19 000 ans)."
