statement: "Le pays antanosy (région de Tôlanaro / Fort-Dauphin) fut le théâtre de la première colonie française durable de Madagascar, à partir de 1642 ; l'Histoire de la grande isle Madagascar (1658) d'Étienne de Flacourt, gouverneur du fort, en reste l'ouvrage de base pour le Sud-Est au XVIIe siècle."
