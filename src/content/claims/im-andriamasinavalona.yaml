statement: "Andriamasinavalona (~1675-1710) aurait porté l'Imerina à son apogée, puis l'aurait partagé entre ses quatre fils — semant une division qui durera près de quatre-vingts ans."
statut: récit
discipline: histoire
domain: imerina-souverains
period: [1675, 1710]
sources: [callet-1878]
note: "Le partage entre héritiers, motif récurrent des traditions, sert à expliquer la fragmentation que la dynastie suivante aura à recoudre."
scope: [royaume-imerina, merina]
