statement: "L'épreuve du tangena, ordalie judiciaire par le poison de la noix de Cerbera, jugeait l'accusé, souvent de sorcellerie : survivre valait innocence, mourir valait culpabilité. Devenue instrument de pouvoir sous Ranavalona Ire, elle fit de très nombreuses victimes avant son interdiction en 1863."
statut: attesté
discipline: histoire
domain: imerina-souverains
period: [1828, 1863]
sources: [campbell-1991, gha-v]
note: "Pratique ancienne (attestée dès le XVIe siècle), portée à son comble comme outil judiciaire et politique sous Ranavalona Ire. Les estimations de mortalité varient beaucoup et viennent de sources européennes souvent hostiles : Campbell avance jusqu'à ~100 000 morts pour la seule année 1838. La forte chute démographique du règne combine tangena, guerres, travail forcé et maladies, et ne saurait être imputée au seul poison."
scope: [royaume-imerina, merina, ile-madagascar]
