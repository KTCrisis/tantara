statement: "Radama II (1861-1863) rouvre le royaume aux Européens et signe la controversée Charte Lambert, avant d'être renversé et assassiné après moins de deux ans de règne."
statut: attesté
discipline: histoire
domain: imerina-souverains
period: [1861, 1863]
sources: [gha-v]
note: "Sa mort ouvre l'ère où le pouvoir réel passe aux Premiers ministres."
scope: [royaume-imerina, merina]
