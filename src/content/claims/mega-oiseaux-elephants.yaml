statement: "Les oiseaux-éléphants de Madagascar (famille des Aepyornithidae) comptaient Vorombe titan, le plus grand oiseau connu de tous les temps, d'une masse moyenne estimée à près de 650 kg ; la famille se répartit en trois genres et au moins quatre espèces."
