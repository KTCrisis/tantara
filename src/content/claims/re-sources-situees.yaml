statement: "L'essentiel de notre savoir écrit sur Madagascar avant le XXe siècle vient d'observateurs extérieurs — administrateurs, missionnaires, militaires, naturalistes — dont le regard renseigne autant sur eux-mêmes que sur l'île."
statut: reconstruit
discipline: histoire
domain: regards-exterieurs
sources: [pouvoir-colonial-2012, flacourt-1658]
note: "Ce n'est pas un défaut à corriger mais une donnée à intégrer : lire ces sources, c'est lire à travers le filtre de leurs auteurs. La parole malgache, elle, passe surtout par l'oral et les sorabe (cf Peuplement, Géographie historique)."
scope: [ile-madagascar]
