statement: "Le riz (vary) est le cœur de l'alimentation et du paysage : la riziculture irriguée, souvent en terrasses, façonne les Hautes Terres, et « manger » se dit littéralement « manger du riz » (mihinam-bary)."
statut: attesté
discipline: autre
domain: traditions
sources: [crowther-2016]
note: "Le riz asiatique, attesté par l'archéobotanique parmi les toutes premières cultures importées, est l'empreinte végétale de l'origine austronésienne devenue institution sociale totale."
scope: [merina, austronesiens, ile-madagascar]
