statement: "Sous la domination merina au XIXe siècle, l'Ankay (pays bezanozano) se trouvait sur l'axe du portage impérial des marchandises entre Antananarivo et la côte est ; ce système de portage par corvée (fanompoana) ne disparut qu'avec l'arrivée du rail et de la route coloniaux, à partir de 1895."
