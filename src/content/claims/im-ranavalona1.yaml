statement: "Ranavalona Ire (1828-1861) renverse la politique d'ouverture : elle expulse les missionnaires, persécute les convertis chrétiens et défend l'autonomie du royaume — tout en faisant industrialiser l'Imerina par Jean Laborde à Mantasoa."
statut: attesté
discipline: histoire
domain: imerina-souverains
period: [1828, 1861]
sources: [gha-v]
note: "Règne de 33 ans, abondamment documenté par les sources européennes — souvent hostiles, à lire avec leur biais (cf Regards extérieurs)."
scope: [royaume-imerina, merina]
