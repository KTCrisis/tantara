statement: "Le fanorona, jeu de stratégie sur damier de lignes tenu pour le jeu national, est ancien et lié à la royauté ; on lui prêtait des usages de divination autant que de divertissement."
statut: attesté
discipline: autre
domain: traditions
sources: [fanorona-icga]
note: "Son origine n'est pas tranchée : parenté possible avec l'alquerque venu par les réseaux arabes de l'océan Indien, ou élaboration locale. Le plateau malgache double celui de l'alquerque."
scope: [merina, ile-madagascar]
