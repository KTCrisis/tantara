statement: "La géographie arabe médiévale mentionne, au sud de l'océan Indien, des toponymes comme al-Qumr et Waqwaq que plusieurs auteurs ont rapportés à Madagascar ; cette identification est ancienne mais demeure débattue."
statut: conjectural
discipline: histoire
domain: regards-exterieurs
period: [950, 1224]
sources: [bonner-2023]
scope: [ile-madagascar]
note: "Une tradition (Ferrand) identifie Waqwaq / al-Qumr à Madagascar ; d'autres (Kumar) y voient le monde insulindien (Sumatra). Le terme n'est pas tranché."
