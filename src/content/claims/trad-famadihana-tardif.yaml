statement: "Sa forme actuelle ne s'est toutefois fixée qu'au XIXe siècle : d'abord rares et variables, les secondes funérailles se généralisent et se standardisent à mesure que se répandent les tombeaux de pierre."
statut: attesté
discipline: histoire
domain: traditions
period: [1820, 1900]
sources: [larson-2001]
note: "Une tradition vivante a une histoire : ce que l'on tient pour immémorial s'est en partie façonné au siècle dernier."
scope: [merina, betsileo]
