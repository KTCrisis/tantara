statement: "Dans une grande partie de l'île, le tombeau familial, bâti pour durer, l'emporte en soin et en dépense sur la maison des vivants : il ancre la lignée à la terre des ancêtres, les razana."
statut: attesté
discipline: autre
domain: traditions
sources: [bloch-1971]
note: "Étude ethnographique des Merina ; le primat du tombeau sur la maison est un trait largement partagé, aux formes variables selon les régions."
scope: [merina, ile-madagascar]
