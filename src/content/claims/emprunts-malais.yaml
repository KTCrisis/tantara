statement: "Le malgache contient des emprunts au malais et au javanais, notamment dans le vocabulaire maritime et directionnel, indice d'un départ via les réseaux marchands malais."
statut: reconstruit
discipline: linguistique
domain: peuplement
sources: [adelaar-1995]
note: "Les locuteurs barito n'étaient pas un peuple navigateur ; les emprunts suggèrent un embarquement dans des équipages ou réseaux malais."
scope: [austronesiens, ile-madagascar]
