statement: "Radama Ier (1810-1828) ouvre le royaume à l'extérieur : traité avec les Britanniques (1817), missionnaires de la London Missionary Society, et adoption de l'alphabet latin pour écrire le malgache."
statut: attesté
discipline: histoire
domain: imerina-souverains
period: [1810, 1828]
sources: [gha-v]
note: "Son règne marque l'entrée de l'Imerina dans l'archive écrite : c'est exactement là que le statut de preuve bascule du récit à l'attesté."
scope: [royaume-imerina, merina]
