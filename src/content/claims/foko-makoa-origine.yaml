statement: "Les Makoa de l'Ouest malgache descendent d'esclaves importés d'Afrique orientale (nord du Mozambique) par la traite au XIXe siècle ; leur nom dérive de celui des Makhuwa, principal groupe du Mozambique actuel, et ils se sont intégrés à l'aire sakalava."
