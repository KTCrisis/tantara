statement: "Andriamanelo (règne traditionnel ~1540-1575) est tenu pour le fondateur de la lignée merina ; on lui prête la lutte contre les Vazimba, premiers occupants des Hautes Terres."
statut: récit
discipline: histoire
domain: imerina-souverains
period: [1540, 1575]
sources: [callet-1878]
note: "Figure connue par la seule tradition ; les Vazimba eux-mêmes tiennent autant du peuple historique que de l'ancêtre mythifié."
