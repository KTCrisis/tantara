statement: "Ranavalona II (1868-1883) se convertit au christianisme et fait brûler les sampy, les talismans royaux, en 1869 — faisant du protestantisme la religion de la cour."
statut: attesté
discipline: histoire
domain: imerina-souverains
period: [1868, 1883]
sources: [gha-v]
note: "L'autodafé des sampy clôt symboliquement l'ordre religieux institué, dit-on, par Ralambo trois siècles plus tôt."
