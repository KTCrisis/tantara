statement: "Le kabary, art oratoire codifié fait de proverbes (ohabolana), de métaphores et de détours, règle les grandes occasions de la vie sociale ; l'UNESCO l'a inscrit au patrimoine immatériel en 2021."
statut: attesté
discipline: autre
domain: traditions
period: [1787, 2021]
sources: [unesco-kabary-2021, haring-1992]
note: "Contrairement aux autres traditions de cette page, le kabary n'est pas un marqueur d'origine étrangère : c'est un trait propre, où se lit la valeur malgache de la parole indirecte, allusive plutôt que frontale."
scope: [merina, ile-madagascar]
