statement: "Andrianjaka (~1612-1630) se serait emparé de la colline d'Analamanga pour y fonder Antananarivo — « la ville des mille » — et y établir le premier rova royal."
statut: récit
discipline: histoire
domain: imerina-souverains
period: [1612, 1630]
sources: [callet-1878]
note: "Acte fondateur de la capitale ; la date et le détail reposent sur la tradition, mais le site du rova est, lui, bien réel."
scope: [royaume-imerina, merina]
