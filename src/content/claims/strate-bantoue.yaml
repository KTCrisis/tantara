statement: "Le malgache porte une strate lexicale bantoue, concentrée sur la faune, l'élevage et la vie matérielle (le zébu omby, du bantou ngombe)."
statut: reconstruit
discipline: linguistique
domain: peuplement
sources: [corps-2019]
note: "Strate d'emprunts identifiée par la linguistique comparée ; elle signe le contact avec la côte est-africaine sans dater précisément ce contact."
