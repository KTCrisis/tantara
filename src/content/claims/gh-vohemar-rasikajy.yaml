statement: "Vohémar, au nord-est, abrite la civilisation rasikajy : une nécropole de plus de 600 tombes riches en céramiques chinoises, bijoux et pierre ollaire, florissante du XIVe au XVIe siècle."
statut: mesuré
discipline: archéologie
domain: geographie-historique
period: [1300, 1600]
geo: { lat: -13.37, lng: 50.0, route: arabo-swahili, label: "Vohémar (Rasikajy)" }
