statement: "La pierre est la demeure durable des morts : tombeaux mégalithiques des Hautes Terres, pierres dressées commémoratives (vatolahy, orimbato), tombeaux de pierre sèche du pays bara."
statut: attesté
discipline: archéologie
domain: traditions
sources: [bloch-1971, manjakahery-2017]
note: "L'image des sépultures logées dans les parois mêmes des reliefs karstiques, courante, reste mal documentée (confiance moyenne) ; le mégalithisme funéraire, lui, est attesté."
scope: [merina, bara, ile-madagascar]
