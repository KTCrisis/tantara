statement: "En 1995 à Belo-sur-Mer, Burney et Ramilisonina recueillent la description, par des villageois âgés, d'un animal nocturne nommé kilopilopitsofy, de la taille d'une vache, sans cornes, fuyant vers l'eau, dont les traits évoquent l'hippopotame nain ; la part du souvenir oral ancien ou d'une survivance tardive est débattue."
