statement: "Madagascar et l'Inde se sont séparées au Crétacé supérieur, vers 88 millions d'années, événement lié au point chaud de Marion ; le volcanisme de la marge orientale a été mis en place rapidement, d'âge moyen 87,6 ± 0,6 Ma."
statut: mesuré
discipline: géologie
domain: geographie-physique
period: [-90000000, -84000000]
sources: [storey-1995]
scope: [ile-madagascar]
note: "Depuis cette rupture, Madagascar est restée isolée de toute masse continentale."
