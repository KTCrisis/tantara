statement: "Érigé en coutume ancestrale (fomba), le hira gasy est pourtant une forme métisse et relativement récente : il croise l'art oratoire du kabary, le chant et la danse, et intègre au XIXe siècle des instruments européens, violon, trompette, accordéon."
statut: reconstruit
discipline: histoire
domain: traditions
sources: [mauro-2001, mcm-hiragasy]
note: "Le nom même dit l'auto-définition par contraste : hira gasy, « chant malgache », par opposition au chant vazaha, étranger."
scope: [merina, royaume-imerina]
