statement: "Du fait de cet isolement océanique précoce et continu, la faune malgache n'est pas un échantillon « africain » classique : la plupart des lignées de vertébrés actuelles descendent d'ancêtres ayant traversé le canal du Mozambique par dispersion transocéanique au Cénozoïque — ce qui explique l'évolution en isolement (lémuriens) et l'absence des grands mammifères continentaux."
statut: reconstruit
discipline: autre
domain: geographie-physique
